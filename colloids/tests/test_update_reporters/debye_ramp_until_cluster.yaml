alpha: 1.0
brush_density: !Quantity
  unit: /(nanometer**2)
  value: 0.09
brush_length: !Quantity
  unit: nanometer
  value: 10.6
checkpoint_filename: checkpoint.chk
checkpoint_interval: 500
cutoff_factor: 21.0
debye_length: !Quantity
  unit: nanometer
  value: 5.0
depletant_radius: null
depletion_phi: null
dielectric_constant: 80.0
electrostatic_radius_average: harmonic
epsilon: !Quantity
    unit: kilojoule/mole
    value: 2.477709860209665  # 1 k_B T
final_configuration_gsd_filename: final_frame.gsd
gravitational_acceleration: null
initial_configuration: first_frame.gsd
integrator: LangevinIntegrator
integrator_parameters:
  frictionCoeff: !Quantity
    unit: /picosecond
    value: 0.001574074286750681
  randomNumberSeed: 3
  stepSize: !Quantity
    unit: picosecond
    value: 0.00317647015905543
  temperature: !Copy
    key: potential_temperature
minimize_energy_initially: false
particle_density: null
platform_name: Reference
run_steps: 100
state_data_filename: state_data.csv
state_data_interval: 10
steric_radius_average: arithmetic
potential_temperature: !Quantity
  unit: kelvin
  value: 298.0
trajectory_filename: trajectory.gsd
trajectory_interval: 10
update_reporter: RampUpdateReporterUntilCluster
update_reporter_parameters:
  filename: update_reporter.csv
  update_interval: !Copy
    key: state_data_interval
  print_interval: !Copy
    key: state_data_interval
  final_update_step: !Copy
    key: run_steps
  parameter_name: debye_length
  start_value: !Copy
    key: debye_length
  end_value: !Quantity
    unit: nanometer
    value: 6.0
  cluster_size: 2000
  cutoff_distance: !Quantity  # Choose small enough so that it does not matter.
    unit: nanometer
    value: 0.1
  ignore_types:
    - "N"
use_depletion: false
use_implicit_substrate: false
substrate_wall_charge: null
use_gravity: false
use_log: false
velocity_seed: 2
wall_directions:
  - true
  - true
  - true
water_density: null
