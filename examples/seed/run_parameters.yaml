use_colloid_potentials: true
brush_density: !Quantity
  unit: /(nanometer**2)
  value: 0.09
brush_length: !Quantity
  unit: nanometer
  value: 10.0
checkpoint_filename: checkpoint.chk
checkpoint_interval: 50000
cutoff_factor: 21.0
debye_length: !Quantity
  unit: nanometer
  value: 4.2
dielectric_constant: 80.0
final_configuration_gsd_filename: final_frame.gsd
frame_index: -1
initial_configuration: initial_configuration.gsd
integrator: LangevinIntegrator
integrator_parameters:
  frictionCoeff: !Quantity
    unit: /picosecond
    value: 0.0015
  randomNumberSeed: null
  stepSize: !Quantity
    unit: picosecond
    value: 0.01
  temperature: !Quantity
    unit: kelvin
    value: 300.0
minimize_energy_initially: true
platform_name: CPU
potential_temperature: !Quantity
  unit: kelvin
  value: 300.0
run_steps: 500000000
state_data_filename: state_data.csv
state_data_interval: 50000
trajectory_filename: trajectory.gsd
trajectory_interval: 25000
update_reporter: null
update_reporter_parameters: null
use_depletion: false
use_lennard_jones: false
use_gravity: false
gravitational_acceleration: null
particle_density: null
water_density: null
use_log: false
velocity_seed: null
wall_directions:
- false
- false
- false
epsilon: null
alpha: null
