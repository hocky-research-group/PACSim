alpha: 1.0
brush_density: !Quantity
  unit: /(nanometer**2)
  value: 0.09
brush_length: !Quantity
  unit: nanometer
  value: 10.0
checkpoint_filename: checkpoint.chk
checkpoint_interval: 100000
cutoff_factor: 21.0
debye_length: !Quantity
  unit: nanometer
  value: 5.42
depletant_radius: null
depletion_phi: null
dielectric_constant: 80.0
electrostatic_radius_average: harmonic
final_configuration_gsd_filename: final_frame.gsd
gravitational_acceleration: null
initial_configuration: firstframe.gsd
integrator: LangevinIntegrator
integrator_parameters:
  frictionCoeff: !Quantity
    unit: /picosecond
    # value: 0.001574074286750681 # 1 hoomd time unit = 0.6352940318110861 ps so if collision_rate = 0.001 hoomd units, use 0.001/0.6352940318110861
    value: 0.01
  randomNumberSeed: 1
  stepSize: !Quantity
    unit: picosecond
    # value: 0.00317647015905543
    value: 0.05    
  temperature: !Copy
    key: potential_temperature
minimize_energy_initially: false
particle_density: null
platform_name: CUDA
potential_temperature: !Quantity
  unit: kelvin
  value: 298.0
run_steps: 10000000
state_data_filename: state_data.csv
state_data_interval: 10000
steric_radius_average: arithmetic
trajectory_filename: trajectory.gsd
trajectory_interval: 10000
update_reporter: null
update_reporter_parameters: null
use_depletion: false
use_gravity: false
use_log: false
use_torch: true
torch_script: model.pt  # generated by running the q6model.py script
velocity_seed: 1
epsilon: !Quantity
    unit: kilojoule/mole
    value: 2.477709860209665  # 1 k_B T
wall_directions:
  - true
  - true
  - true
water_density: null
