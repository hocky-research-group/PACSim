alpha: 1.0
brush_density: !Quantity
  unit: /(nanometer**2)
  value: 0.09
brush_length: !Quantity
  unit: nanometer
  value: 10.6
checkpoint_filename: test_run_and_resume/checkpoint.chk
checkpoint_interval: 50
cutoff_factor: 21.0
debye_length: !Quantity
  unit: nanometer
  value: 5.726968
depletant_radius: !Quantity
    unit: nanometer
    value: 5.0
depletion_phi: 0.5
dielectric_constant: 80.0
electrostatic_radius_average: harmonic
epsilon: !Quantity
    unit: kilojoule/mole
    value: 2.477709860209665  # 1 k_B T
final_configuration_gsd_filename: test_run_and_resume/final_frame_resume.gsd
gravitational_acceleration: !Quantity
    unit: meter/(second**2)
    value: 9.8
initial_configuration: full_first_frame.gsd
integrator: LangevinIntegrator
integrator_parameters:
  frictionCoeff: !Quantity
    unit: /picosecond
    value: 0.001574074286750681
  randomNumberSeed: 3
  stepSize: !Quantity
    unit: picosecond
    value: 0.00317647015905543
  temperature: !Copy
    key: potential_temperature
minimize_energy_initially: false
particle_density: !Quantity
  unit: gram/(centimeter**3)
  value: 1.05
platform_name: Reference
potential_temperature: !Quantity
  unit: kelvin
  value: 298.0
run_steps: 50
state_data_filename: test_run_and_resume/state_data_resume.csv
state_data_interval: 10
steric_radius_average: harmonic
trajectory_filename: test_run_and_resume/trajectory_resume.gsd
trajectory_interval: 10
update_reporter: RampUpdateReporter
update_reporter_parameters:
  filename: test_run_and_resume/update_reporter_resume.csv
  update_interval: !Copy
    key: state_data_interval
  print_interval: !Copy
    key: state_data_interval
  final_update_step: 100
  global_parameter_name: debye_length
  start_value: !Copy
    key: debye_length
  end_value: !Quantity
    unit: nanometer
    value: 6.0
use_depletion: true
use_gravity: true
use_log: false
velocity_seed: 2
wall_directions:
  - true
  - true
  - true
water_density: !Quantity
  unit: gram/(centimeter**3)
  value: 0.998
