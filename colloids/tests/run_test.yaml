alpha: 1.0
brush_density: !Quantity
  unit: /(nanometer**2)
  value: 0.09
brush_length: !Quantity
  unit: nanometer
  value: 10.6
checkpoint_filename: test_run_and_resume/checkpoint.chk
checkpoint_interval: 500
cutoff_factor: 21.0
debye_length: !Quantity
  unit: nanometer
  value: 5.726968
depletant_radius: !Quantity
    unit: nanometer
    value: 5.0
depletion_phi: 0.5
dielectric_constant: 80.0
epsilon: !Quantity
    unit: kilojoule/mole
    value: 2.477709860209665
final_configuration_gsd_filename: test_run_and_resume/final_frame.gsd
final_configuration_xyz_filename: test_run_and_resume/final_frame.xyz
gravitational_acceleration: !Quantity
    unit: meter/(second**2)
    value: 9.8
initial_configuration: first_frame.xyz
integrator: LangevinIntegrator
integrator_parameters:
  frictionCoeff: !Quantity
    unit: /picosecond
    value: 0.001574074286750681
  randomNumberSeed: 3
  stepSize: !Quantity
    unit: picosecond
    value: 0.00317647015905543
  temperature: !Copy
    key: potential_temperature
masses:
  N: !Quantity
    unit: dalton
    value: 0.7406327610409243
  P: !Quantity
    unit: dalton
    value: 1.0
minimize_energy_initially: false
particle_density: !Quantity
  unit: gram/(centimeter**3)
  value: 1.05
platform_name: Reference
radii:
  N: !Quantity
    unit: nanometer
    value: 95.0
  P: !Quantity
    unit: nanometer
    value: 105.0
run_steps: 100
state_data_filename: test_run_and_resume/state_data.csv
state_data_interval: 10
surface_potentials:
  N: !Quantity
    unit: millivolt
    value: -54.0
  P: !Quantity
    unit: millivolt
    value: 44.0
potential_temperature: !Quantity
  unit: kelvin
  value: 298.0
trajectory_filename: test_run_and_resume/trajectory.gsd
trajectory_interval: 10
update_reporter_parameters:
  filename: test_run_and_resume/update_reporter.csv
  update_interval: 10
  final_update_step: !Copy
    key: run_steps
  global_parameter_name: debye_length
  start_value: !Copy
    key: debye_length
  end_value: !Quantity
    unit: nanometer
    value: 6.0
use_depletion: true
use_gravity: true
use_log: false
use_update_reporter: true
use_tabulated: false
velocity_seed: 2
wall_directions:
  - true
  - true
  - true
water_density: !Quantity
  unit: gram/(centimeter**3)
  value: 0.998
